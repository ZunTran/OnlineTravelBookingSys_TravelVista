<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{base :: head('Quản lý danh mục')}"></th:block>
</head>
<body>
    <div th:replace="~{base :: header}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{base :: menu('cate')}"></div>

            <main class="col-md-10 p-4">
                <div class="card p-4 border-0 shadow-sm rounded-3 bg-white">
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                        <h3 class="fw-bold text-dark m-0">DANH MỤC HỆ THỐNG</h3>
                        <button class="btn btn-primary fw-bold px-3 rounded-2" data-bs-toggle="modal" data-bs-target="#modalAdd">
                            <i class="bi bi-plus-circle me-1"></i> Thêm danh mục
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle border">
                            <thead class="table-light text-secondary">
                                <tr>
                                    <th>ID</th>
                                    <th>Tên danh mục</th>
                                    <th>Mã loại</th>
                                    <th>Cấp cha</th>
                                    <th class="text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="listCate"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="modalAdd" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg p-4 rounded-3">
                <h5 class="fw-bold text-dark border-bottom pb-2">Thêm danh mục mới</h5>
                <form class="mt-3">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Tên danh mục</label>
                        <input type="text" class="form-control border-2" required placeholder="Ví dụ: Khách sạn 5 sao...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Loại gốc (Enum)</label>
                        <select class="form-select border-2">
                            <option value="TOUR">TOUR</option>
                            <option value="HOTEL">HOTEL</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2 rounded-2 mt-2">Lưu lại</button>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{base :: footer}"></div>
    <th:block th:replace="~{base :: scripts}"></th:block>

    <script>
        async function loadData() {
            let tk = localStorage.getItem('admin_token');
            try {
                let res = await fetch('/TravelVista/api/categories', {
                    headers: { 'Authorization': 'Bearer ' + tk }
                });
                let json = await res.json();
                let html = '';
                if (json.success && json.data) {
                    json.data.forEach(c => {
                        html += `
                            <tr>
                                <td><code>#CAT_${c.id}</code></td>
                                <td class="fw-bold text-dark">${c.name}</td>
                                <td><span class="badge bg-secondary-subtle text-secondary border border-secondary px-2 py-1">${c.serviceType}</span></td>
                                <td>${c.parentName ? `<span class="text-primary fw-medium">` + c.parentName + `</span>` : '<span class="text-muted small">Gốc</span>'}</td>
                                <td class="text-center">
                                    <button class="btn btn-sm btn-outline-warning px-2 py-1 me-1"><i class="bi bi-pencil-square"></i></button>
                                    <button class="btn btn-sm btn-outline-danger px-2 py-1"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>`;
                    });
                }
                document.getElementById('listCate').innerHTML = html || '<tr><td colspan="5" class="text-center py-3 text-muted">Không có dữ liệu!</td></tr>';
            } catch (err) { console.error(err); }
        }
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
