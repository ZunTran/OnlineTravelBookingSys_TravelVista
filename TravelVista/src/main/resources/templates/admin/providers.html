<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{base :: head('Quản lý nhà cung cấp')}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{base :: header}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{base :: menu('prov')}"></div>

            <main class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-primary"><i class="bi bi-person-badge me-2"></i>Quản lý đối tác</h2>
                </div>

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-2">
                        <ul class="nav nav-pills" id="provTabs">
                            <li class="nav-item"><button class="nav-link active fw-bold px-4" onclick="loadProviders('pending', 1)">Chờ duyệt</button></li>
                            <li class="nav-item"><button class="nav-link fw-bold px-4" onclick="loadProviders('approved', 1)">Đã duyệt</button></li>
                            <li class="nav-item"><button class="nav-link fw-bold px-4" onclick="loadProviders('rejected', 1)">Từ chối</button></li>
                            <li class="nav-item"><button class="nav-link fw-bold px-4" onclick="loadProviders('banned', 1)">Bị khóa</button></li>
                        </ul>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-0 pt-4 pb-2">
                        <span class="text-secondary fw-bold ms-2">Tổng số bản ghi: <span id="totalElements">0</span></span>
                    </div>
                    <div class="table-responsive p-3">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3">ID</th>
                                    <th>Thông tin đối tác</th>
                                    <th>MST</th>
                                    <th>Hotline</th>
                                    <th>Lý do</th>
                                    <th class="text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="providerTableBody"></tbody>
                        </table>
                    </div>
                    <div class="card-footer bg-white border-0 pb-4">
                        <nav><ul class="pagination justify-content-center" id="pagination"></ul></nav>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div th:replace="~{base :: footer}"></div>
    <th:block th:replace="~{base :: scripts}"></th:block>

    <script>
        let currentType = "pending";

        async function loadProviders(type, page = 1) {
            currentType = type;
            // Class active của Bootstrap 5
            document.querySelectorAll(".nav-link").forEach(btn => {
                btn.classList.toggle("active", btn.innerText.toLowerCase().includes(type.replace('pending', 'chờ duyệt').replace('approved', 'đã duyệt').replace('rejected', 'đã từ chối').replace('banned', 'bị khóa')));
            });

            const token = localStorage.getItem("admin_token");
            const res = await fetch(`/TravelVista/api/admin/providers/${type}?page=${page}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const json = await res.json();
            
            if (json.success) {
                renderTable(json.data.content, type);
                renderPagination(json.data);
                document.getElementById("totalElements").innerText = json.data.totalElements ?? 0;
            }
        }

        function renderTable(data, type) {
            let html = "";
            if (!data || data.length === 0) {
                html = '<tr><td colspan="6" class="text-center text-muted py-5">Không tìm thấy dữ liệu</td></tr>';
            } else {
                data.forEach(p => {
                    html += `<tr>
                        <td class="ps-3"><span class="badge bg-secondary rounded-pill">#${p.providerId}</span></td>
                        <td>
                            <div class="fw-bold">${p.companyName}</div>
                            <div class="text-muted small">${p.fullName} • ${p.email}</div>
                        </td>
                        <td><span class="badge bg-light text-dark border">${p.taxCode}</span></td>
                        <td>${p.hotline}</td>
                        <td class="text-muted small">${(type === "rejected" || type === "banned") ? (p.statusReason || "-") : "-"}</td>
                        <td class="text-center">
                            ${type === "pending" ? `<button class="btn btn-sm btn-outline-success fw-bold" onclick="handleAction(${p.providerId}, 'approve')">Duyệt</button> <button class="btn btn-sm btn-outline-danger fw-bold" onclick="handleAction(${p.providerId}, 'reject')">Từ chối</button>` : ""}
                            ${type === "approved" ? `<button class="btn btn-sm btn-dark fw-bold" onclick="handleAction(${p.providerId}, 'ban')">Khóa</button>` : ""}
                        </td>
                    </tr>`;
                });
            }
            document.getElementById("providerTableBody").innerHTML = html;
        }

        // Logic phân trang chuẩn Bootstrap
        function renderPagination(data) {
            let total = Math.ceil((data.totalElements || 1) / (data.size || 20));
            let html = `<li class="page-item ${data.page <= 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadProviders('${currentType}', ${data.page - 1}); return false;">«</a></li>`;
            for (let i = 1; i <= total; i++) {
                html += `<li class="page-item ${i === data.page ? 'active' : ''}"><a class="page-link" href="#" onclick="loadProviders('${currentType}', ${i}); return false;">${i}</a></li>`;
            }
            html += `<li class="page-item ${data.page >= total ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadProviders('${currentType}', ${data.page + 1}); return false;">»</a></li>`;
            document.getElementById("pagination").innerHTML = html;
        }

        async function handleAction(id, action) {
            let reason = (action !== "approve") ? prompt("Nhập lý do:") : "";
            if (action !== "approve" && !reason) return;
            if (action === "approve" && !confirm("Xác nhận duyệt?")) return;

            const token = localStorage.getItem("admin_token");
            await fetch(`/TravelVista/api/admin/providers/${id}/${action}`, {
                method: "PUT",
                headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
                body: JSON.stringify({ reason })
            });
            loadProviders(currentType);
        }

        window.addEventListener('DOMContentLoaded', () => loadProviders("pending"));
    </script>
</body>
