<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <title th:text="${title}">Hệ thống quản trị</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; }
        .nav-top { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .sidebar { background-color: #ffffff; min-height: calc(100vh - 60px); box-shadow: 4px 0 10px rgba(0,0,0,0.03); }
        .sidebar .nav-link { color: #64748b; font-weight: 500; padding: 12px 20px; margin: 4px 12px; border-radius: 8px; transition: all 0.2s; }
        .sidebar .nav-link:hover { background-color: #f1f5f9; color: #0d6efd; }
        .sidebar .nav-link.active { background-color: #0d6efd; color: #ffffff !important; box-shadow: 0 4px 12px rgba(13, 110, 253, 0.25); }
        .sidebar .nav-link i { font-size: 1.1rem; }
        footer { background-color: #ffffff; color: #64748b; border-top: 1px solid #e2e8f0; font-weight: 500; }
    </style>
</head>
<body>

    <header th:fragment="header" class="navbar navbar-expand nav-top sticky-top px-4 shadow-sm" style="height: 60px;">
        <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="/TravelVista/admin/dashboard">
            <i class="bi bi-compass-fill text-info"></i>
            <span style="letter-spacing: 0.5px;">TRAVEL VISTA <span class="badge bg-info text-dark fs-7 ms-1">ADMIN</span></span>
        </a>
        
        <div class="ms-auto">
            <button onclick="logout()" class="btn btn-sm btn-outline-light rounded-pill px-3 d-flex align-items-center gap-1">
                <i class="bi bi-box-arrow-right"></i> Đăng xuất
            </button>
        </div>
    </header>

    <div th:fragment="menu(page)" class="col-md-2 sidebar p-0">
        <div class="pt-4">
            <div class="px-4 mb-3 text-uppercase fs-7 fw-bold text-muted" style="letter-spacing: 1px;">Bảng điều khiển</div>
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-3" th:classappend="${page == 'home' ? 'active' : ''}" href="/TravelVista/admin/dashboard">
                        <i class="bi bi-speedometer2"></i> <span>Báo cáo thống kê</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-3" th:classappend="${page == 'cate' ? 'active' : ''}" href="/TravelVista/admin/categories">
                        <i class="bi bi-grid-1x2"></i> <span>Quản lý danh mục</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-3" th:classappend="${page == 'prov' ? 'active' : ''}" href="/TravelVista/admin/providers">
                        <i class="bi bi-check-circle"></i> <span>Duyệt đối tác</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <footer th:fragment="footer" class="text-center py-3">
        <div>Hệ thống Quản trị Travel Vista </div>
        <div class="text-muted mt-1" style="font-size: 0.8rem;">Zun & Han  &copy; 2026</div>
    </footer>

    <th:block th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function getRole(token) {
                try {
                    let data = JSON.parse(atob(token.split('.')[1]));
                    return data.role || data.roles || data.sub || data.authorities;
                } catch(e) { return null; }
            }
            window.addEventListener('DOMContentLoaded', () => {
                let tk = localStorage.getItem('admin_token');
                let isLogin = window.location.pathname.includes('/admin/login');

                if (!isLogin) {
                    if (!tk) {
                        window.location.href = '/TravelVista/admin/login';
                        return;
                    }
                    let role = String(getRole(tk)).toUpperCase();
                    if (!role.includes('ADMIN')) {
                        alert("Tài khoản của bạn không có quyền Admin!");
                        localStorage.removeItem('admin_token');
                        window.location.href = '/TravelVista/admin/login';
                    }
                } else if (tk) {
                    let role = String(getRole(tk)).toUpperCase();
                    if (role.includes('ADMIN')) window.location.href = '/TravelVista/admin/dashboard';
                }
            });
            function logout() {
                localStorage.removeItem('admin_token');
                window.location.href = '/TravelVista/admin/login';
            }
        </script>
    </th:block>

</body>
</html>
